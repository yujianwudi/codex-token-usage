name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.26.5"
  GOVULNCHECK_VERSION: "v1.6.0"
  PLUGIN_REPOSITORY: https://github.com/yujianwudi/codex-token-usage

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate tag and source version
        id: version
        shell: bash
        run: |
          version="$(bash scripts/resolve-release-version.sh "${GITHUB_REF_NAME}")"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  source-security:
    name: Source security gate
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify module
        run: go mod verify

      - name: Source vulnerability scan
        shell: bash
        run: go run "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}" -mode=source ./...

  build-linux:
    name: Build linux ${{ matrix.goarch }}
    needs:
      - validate
      - source-security
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-latest
          - goarch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    container:
      image: ubuntu:20.04
    env:
      GOOS: linux
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: "1"
      PLUGIN_VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Install Linux build dependencies
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            binutils ca-certificates file gcc git libc6-dev python3 tar unzip zip
          rm -rf /var/lib/apt/lists/*

      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Test
        run: go test ./...

      - name: Package
        shell: bash
        run: bash ./package-release.sh dist

      - name: Binary vulnerability scan
        shell: bash
        run: go run "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}" -mode=binary ./codex-token-usage.so

      - name: Linux dlopen and ABI smoke test
        shell: bash
        run: bash scripts/smoke-abi.sh ./codex-token-usage.so

      - name: Enforce glibc 2.31 compatibility ceiling
        shell: bash
        run: bash scripts/check-glibc.sh ./codex-token-usage.so 2.31

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: codex-token-usage.so
          format: spdx-json
          output-file: dist/codex-token-usage_${{ needs.validate.outputs.version }}_linux_${{ matrix.goarch }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cpa-plugin-linux-${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/*.spdx.json
          if-no-files-found: error
          retention-days: 7

  build-other:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    needs:
      - validate
      - source-security
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            runner: macos-15-large
            ext: dylib
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: dylib
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: dll
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: "1"
      PLUGIN_VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Windows C compiler
        if: matrix.goos == 'windows'
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            zip

      - name: Add MSYS2 to PATH
        if: matrix.goos == 'windows'
        shell: pwsh
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Test
        run: go test ./...

      - name: Package
        shell: bash
        run: bash ./package-release.sh dist

      - name: Binary vulnerability scan
        shell: bash
        run: go run "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}" -mode=binary "./codex-token-usage.${{ matrix.ext }}"

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: codex-token-usage.${{ matrix.ext }}
          format: spdx-json
          output-file: dist/codex-token-usage_${{ needs.validate.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cpa-plugin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/*.spdx.json
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs:
      - validate
      - build-linux
      - build-other
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify release assets and generate checksums
        shell: bash
        run: bash scripts/verify-release-assets.sh "${{ needs.validate.outputs.version }}" release-assets

      - name: Attest release provenance
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release-assets/*.zip

      - name: Create release
        uses: softprops/action-gh-release@fe965f7af51af5f2602596916f38a38df2e33de0 # v3.0.2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: true
