name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Stable SemVer from a candidate branch, with or without the v prefix"
        required: true
        type: string
      waive_independent_acceptance:
        description: "Repository-owner emergency waiver for second-machine acceptance"
        required: false
        default: false
        type: boolean
      waiver_confirmation:
        description: "When waiving, enter WAIVE_SECOND_MACHINE_vX.Y.Z"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ startsWith(inputs.version, 'v') && inputs.version || format('v{0}', inputs.version) }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.26.5"
  GOVULNCHECK_VERSION: "v1.6.0"
  ACTIONLINT_VERSION: "v1.7.7"
  SHELLCHECK_VERSION: "v0.11.0"
  SHELLCHECK_LINUX_X86_64_SHA256: "8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198"
  PLUGIN_REPOSITORY: https://github.com/yujianwudi/codex-token-usage

jobs:
  validate:
    name: Validate release request
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      commit: ${{ steps.version.outputs.commit }}
      acceptance_waived: ${{ steps.version.outputs.acceptance_waived }}
    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate version, source, and unused release tag
        id: version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          WAIVE_INDEPENDENT_ACCEPTANCE: ${{ inputs.waive_independent_acceptance }}
          WAIVER_CONFIRMATION: ${{ inputs.waiver_confirmation }}
        run: |
          if [[ "${GITHUB_REF}" != refs/heads/* ]]; then
            echo "Release candidates must be dispatched from a branch" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "Release candidates must be dispatched from an unmerged candidate branch" >&2
            exit 1
          fi

          requested="${REQUESTED_VERSION#v}"
          if [[ -z "${requested}" ]]; then
            echo "Manual release validation requires an explicit version" >&2
            exit 1
          fi
          release_ref="v${requested}"

          git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          source_commit="$(git rev-parse HEAD)"
          main_commit="$(git rev-parse refs/remotes/origin/main)"
          if [[ "${WAIVE_INDEPENDENT_ACCEPTANCE}" == "true" && "${source_commit}" != "${main_commit}" ]]; then
            echo "Owner-waived publication requires the exact candidate commit to already be on origin/main" >&2
            exit 1
          fi
          if [[ "${WAIVE_INDEPENDENT_ACCEPTANCE}" != "true" && "${source_commit}" == "${main_commit}" ]]; then
            echo "Release candidate commit is already on origin/main; independent acceptance must happen before promotion" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "${main_commit}" "${source_commit}"; then
            echo "Candidate commit must be a fast-forward descendant of the current origin/main" >&2
            exit 1
          fi

          version="$(bash scripts/resolve-release-version.sh "${release_ref}")"
          tag="v${version}"
          if [[ "${version}" == *[-+]* ]]; then
            echo "Stable publication requires a plain MAJOR.MINOR.PATCH version without prerelease or build metadata" >&2
            exit 1
          fi

          if [[ "${WAIVE_INDEPENDENT_ACCEPTANCE}" == "true" ]]; then
            bash scripts/check-release-waiver.sh \
              "${tag}" \
              "${GITHUB_ACTOR}" \
              "${GITHUB_REPOSITORY_OWNER}" \
              "${WAIVER_CONFIRMATION}"
          elif [[ -n "${WAIVER_CONFIRMATION}" ]]; then
            echo "waiver_confirmation is only valid when waive_independent_acceptance is true" >&2
            exit 1
          fi

          if [[ -n "$(git ls-remote --tags origin "refs/tags/${tag}" "refs/tags/${tag}^{}")" ]]; then
            echo "Release tag ${tag} already exists; dispatch a new version" >&2
            exit 1
          fi

          {
            echo "version=${version}"
            echo "tag=${tag}"
            echo "commit=${source_commit}"
            echo "acceptance_waived=${WAIVE_INDEPENDENT_ACCEPTANCE}"
          } >> "${GITHUB_OUTPUT}"

  source-security:
    name: Source security gate
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install pinned ShellCheck
        shell: bash
        run: |
          archive="${RUNNER_TEMP}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          url="https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          curl --fail --location --silent --show-error \
            --retry 3 --retry-all-errors \
            --output "${archive}" \
            "${url}"
          printf '%s  %s\n' "${SHELLCHECK_LINUX_X86_64_SHA256}" "${archive}" | sha256sum -c -
          tar -xJf "${archive}" -C "${RUNNER_TEMP}"
          shellcheck_dir="${RUNNER_TEMP}/shellcheck-${SHELLCHECK_VERSION}"
          test -x "${shellcheck_dir}/shellcheck"
          echo "${shellcheck_dir}" >> "${GITHUB_PATH}"

      - name: Verify module, scripts, and release compliance
        shell: bash
        run: |
          go mod download
          go mod verify
          go mod tidy -diff
          bash -n build.sh
          bash -n package-release.sh
          for script in scripts/*.sh; do
            bash -n "${script}"
          done
          bash scripts/check-third-party-notices.sh
          bash scripts/check-version-consistency.sh
          bash scripts/test-semver.sh
          bash scripts/test-check-benchmark-budget.sh
          bash scripts/test-cpa-compat-lock.sh
          bash scripts/test-release-acceptance-gate.sh
          bash scripts/test-check-macho.sh
          bash scripts/test-select-previous-release-tag.sh
          bash scripts/test-verify-release-assets.sh

      - name: Lint Go, shell, and workflows
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "${unformatted}" ]]; then
            echo "Go files require gofmt:" >&2
            echo "${unformatted}" >&2
            exit 1
          fi
          shellcheck -x build.sh package-release.sh scripts/*.sh
          go run "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}" \
            -shellcheck="$(command -v shellcheck)" \
            .github/workflows/*.yml

      - name: Test
        run: go test -count=1 ./...

      - name: Verify v0.1.38 refuses schema v6 without logical writes
        shell: bash
        run: bash scripts/test-v0138-downgrade-guard.sh

      - name: Benchmark scheduler performance budgets
        id: scheduler_benchmarks
        shell: bash
        run: |
          set -o pipefail
          results="${RUNNER_TEMP}/release-scheduler-benchmarks.txt"
          go test -run '^$' -bench '^Benchmark' -benchmem -benchtime=500ms -count=3 . | tee "${results}"
          bash scripts/check-benchmark-budget.sh "${results}"

      - name: Upload release scheduler benchmark evidence
        if: ${{ always() && steps.scheduler_benchmarks.outcome != 'skipped' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-scheduler-benchmarks-${{ needs.validate.outputs.commit }}
          path: ${{ runner.temp }}/release-scheduler-benchmarks.txt
          if-no-files-found: error
          retention-days: 30

      - name: Source vulnerability scan
        shell: bash
        run: go run "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}" -mode=source ./...

      - name: Fuzz Provider canonicalization and identity aliases
        run: >-
          go test -run '^$'
          -fuzz '^FuzzCanonicalProviderAndAliases$'
          -fuzztime=10s -parallel=4 -timeout=2m .

      - name: Fuzz mixed scheduler filtering
        run: >-
          go test -run '^$'
          -fuzz '^FuzzMixedSchedulerFiltering$'
          -fuzztime=15s -parallel=4 -timeout=2m .

      - name: Fuzz SQLite v6 migration fixtures
        run: >-
          go test -run '^$'
          -fuzz '^FuzzSQLiteV6MigrationFixture$'
          -fuzztime=20s -parallel=2 -timeout=3m .

      - name: Verify cross-process reservation atomicity
        env:
          CPA_MULTIPROCESS_STRESS: "1"
        run: >-
          go test -count=1 -v
          -run '^(TestAccountProtectionMultiprocessHardLimit|TestReservationWriterCrashRecovery|TestReservationWriterLockFailsClosedWithinSchedulerBudget)$'
          ./...

      - name: Verify native C ABI panic boundary and release-hook absence
        shell: bash
        run: bash scripts/test-abi-panic-boundary.sh

      - name: Race test
        run: go test -race -count=1 ./...

      - name: Vet
        run: go vet ./...

      - name: Resolve latest published CLIProxyAPI revision
        id: resolve_cpa
        shell: bash
        env:
          CPA_COMPAT_CHANNEL: latest-release
          CPA_COMPAT_GITHUB_TOKEN: ${{ github.token }}
          CPA_COMPAT_VALIDATE_ONLY: "true"
        run: |
          resolved="$(bash scripts/check-cpa-compat.sh)"
          printf '%s\n' "${resolved}"
          commit="$(sed -n 's/^commit=//p' <<< "${resolved}" | tail -n 1)"
          [[ "${commit}" =~ ^[0-9a-f]{40}$ ]]
          echo "commit=${commit}" >> "${GITHUB_OUTPUT}"

      # This is intentionally the final source-security step. The downloaded
      # CPA source receives no token-bearing environment or later trusted step.
      - name: Verify resolved CLIProxyAPI compatibility without credentials
        shell: bash
        env:
          CPA_COMPAT_CHANNEL: locked
          CPA_COMPAT_COMMIT: ${{ steps.resolve_cpa.outputs.commit }}
          CPA_COMPAT_EXECUTION_MODE: docker
        run: bash scripts/check-cpa-compat.sh

  build-linux:
    name: Build linux ${{ matrix.goarch }}
    needs:
      - validate
      - source-security
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-latest
          - goarch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    container:
      # Keep the glibc 2.31 build root reproducible on both amd64 and arm64.
      image: ubuntu:20.04@sha256:8feb4d8ca5354def3d8fce243717141ce31e2c428701f6682bd2fafe15388214
    env:
      GOOS: linux
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: "1"
      PLUGIN_VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Install Linux build dependencies
        shell: bash
        run: |
          packages=(binutils ca-certificates curl file gcc git libc6-dev python3 tar unzip zip)
          apt_options=(
            -o Acquire::Retries=2
            -o Acquire::ForceIPv4=true
            -o Acquire::http::Timeout=30
            -o Acquire::https::Timeout=30
          )

          rm -rf /var/lib/apt/lists/*
          for attempt in 1 2 3; do
            if apt-get "${apt_options[@]}" -o APT::Update::Error-Mode=any update; then
              break
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "Linux package index update failed after ${attempt} attempts" >&2
              exit 1
            fi
            delay=$((attempt * 15))
            echo "Linux package index update failed; retrying in ${delay}s (${attempt}/3)" >&2
            sleep "${delay}"
          done

          for attempt in 1 2 3; do
            if DEBIAN_FRONTEND=noninteractive apt-get "${apt_options[@]}" install -y --no-install-recommends "${packages[@]}"; then
              break
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "Linux dependency installation failed after ${attempt} attempts" >&2
              exit 1
            fi
            delay=$((attempt * 15))
            echo "Linux dependency installation failed; retrying in ${delay}s (${attempt}/3)" >&2
            sleep "${delay}"
          done
          rm -rf /var/lib/apt/lists/*

      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Test
        run: go test -count=1 ./...

      - name: Package
        shell: bash
        run: bash ./package-release.sh dist

      - name: Binary vulnerability scan
        shell: bash
        run: go run "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}" -mode=binary ./codex-token-usage.so

      - name: Linux dlopen and ABI smoke test
        shell: bash
        run: bash scripts/smoke-abi.sh ./codex-token-usage.so

      - name: Enforce glibc 2.31 compatibility ceiling
        shell: bash
        run: bash scripts/check-glibc.sh ./codex-token-usage.so 2.31

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: codex-token-usage.so
          format: spdx-json
          output-file: dist/codex-token-usage_${{ needs.validate.outputs.version }}_linux_${{ matrix.goarch }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cpa-plugin-build-linux-${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/*.spdx.json
          if-no-files-found: error
          retention-days: 7

  build-other:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    needs:
      - validate
      - source-security
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            # macos-15-intel is the current standard x64 label; format() keeps
            # older actionlint runner catalogs from rejecting the valid label.
            runner: ${{ format('macos-15-{0}', 'intel') }}
            ext: dylib
            macos_target: "12.0"
          - goos: darwin
            goarch: arm64
            runner: macos-15
            ext: dylib
            macos_target: "12.0"
          - goos: windows
            goarch: amd64
            runner: windows-2025
            ext: dll
            macos_target: ""
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: "1"
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_target }}
      PLUGIN_VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify native build host architecture
        shell: bash
        run: |
          host_arch="$(go env GOHOSTARCH)"
          if [[ "${host_arch}" != "${GOARCH}" ]]; then
            echo "CGO release builds must be native: host=${host_arch} target=${GOARCH}" >&2
            exit 1
          fi

      - name: Install Windows C compiler
        if: matrix.goos == 'windows'
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            zip

      - name: Add MSYS2 to PATH
        if: matrix.goos == 'windows'
        shell: pwsh
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Test
        run: go test -count=1 ./...

      - name: Package
        shell: bash
        run: bash ./package-release.sh dist

      - name: Shared-library ABI and architecture smoke test
        shell: bash
        run: bash scripts/smoke-abi.sh "./codex-token-usage.${{ matrix.ext }}" "${GOOS}" "${GOARCH}"

      - name: Enforce Darwin architecture and macOS 12 compatibility
        if: matrix.goos == 'darwin'
        shell: bash
        run: bash scripts/check-macho.sh ./codex-token-usage.dylib "${GOARCH}" "${MACOSX_DEPLOYMENT_TARGET}"

      - name: Binary vulnerability scan
        shell: bash
        run: go run "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}" -mode=binary "./codex-token-usage.${{ matrix.ext }}"

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: codex-token-usage.${{ matrix.ext }}
          format: spdx-json
          output-file: dist/codex-token-usage_${{ needs.validate.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cpa-plugin-build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/*.spdx.json
          if-no-files-found: error
          retention-days: 7

  verify-assets:
    name: Verify complete release bundle
    needs:
      - validate
      - build-linux
      - build-other
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      bundle_digest: ${{ steps.bundle.outputs.bundle_digest }}
    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cpa-plugin-build-*
          path: release-assets
          merge-multiple: true

      - name: Verify release assets and generate checksums
        id: bundle
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
          ACCEPTANCE_WAIVED: ${{ needs.validate.outputs.acceptance_waived }}
        run: |
          bash scripts/verify-release-assets.sh "${RELEASE_VERSION}" release-assets
          bundle_digest="$(sha256sum release-assets/checksums.txt | awk '{print tolower($1)}')"
          if [[ ! "${bundle_digest}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Failed to calculate the candidate bundle digest" >&2
            exit 1
          fi
          acceptance="${RELEASE_TAG}@${RELEASE_COMMIT}@${bundle_digest}"
          echo "bundle_digest=${bundle_digest}" >> "${GITHUB_OUTPUT}"
          {
            if [[ "${ACCEPTANCE_WAIVED}" == "true" ]]; then
              echo "## Release candidate ready for owner-waived publication"
            else
              echo "## Release candidate ready for independent acceptance"
            fi
            echo
            echo "- Artifact: \`cpa-plugin-release-${RELEASE_VERSION}\`"
            echo "- Source commit: \`${RELEASE_COMMIT}\`"
            echo "- Bundle digest (SHA-256 of \`checksums.txt\`): \`${bundle_digest}\`"
            echo
            if [[ "${ACCEPTANCE_WAIVED}" == "true" ]]; then
              echo "Independent second-machine acceptance was waived by the repository owner. The publish job uses the \`owner-waived-release\` Environment and will record the waiver in the tag and Release notes."
            else
              echo "- Required authorization: \`${acceptance}\`"
              echo
              echo "The publish job uses the \`independent-release\` Environment and cannot create the annotated tag until that exact authorization is configured and approved."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload verified release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cpa-plugin-release-${{ needs.validate.outputs.version }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs:
      - validate
      - verify-assets
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.waive_independent_acceptance && 'owner-waived-release' || 'independent-release' }}
    timeout-minutes: 20
    concurrency:
      # Stable publications share one repository-wide lane. Per-tag groups
      # allow two accepted versions to race previous-release selection and
      # latest-release mutation, producing an out-of-order stable history.
      group: publish-stable
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The publish job validates that the previous release is an ancestor
          # of the tagged commit. A depth-1 checkout marks the tag commit as a
          # shallow boundary, which makes that valid ancestry check fail.
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.commit }}
          persist-credentials: false

      - name: Download verified release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cpa-plugin-release-${{ needs.validate.outputs.version }}
          path: release-assets

      - name: Verify the accepted candidate bundle is unchanged
        shell: bash
        env:
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
          EXPECTED_BUNDLE_DIGEST: ${{ needs.verify-assets.outputs.bundle_digest }}
        run: |
          if [[ "$(git rev-parse HEAD)" != "${RELEASE_COMMIT}" ]]; then
            echo "Publish checkout does not match the candidate source commit" >&2
            exit 1
          fi
          if [[ ! "${EXPECTED_BUNDLE_DIGEST}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Candidate job did not provide a canonical bundle digest" >&2
            exit 1
          fi
          expected_files="${RUNNER_TEMP}/expected-release-files.txt"
          actual_files="${RUNNER_TEMP}/actual-release-files.txt"
          awk '{print $2}' release-assets/checksums.txt | LC_ALL=C sort > "${expected_files}"
          echo checksums.txt >> "${expected_files}"
          LC_ALL=C sort -o "${expected_files}" "${expected_files}"
          find release-assets -mindepth 1 -maxdepth 1 -printf '%f\n' | LC_ALL=C sort > "${actual_files}"
          if ! diff -u "${expected_files}" "${actual_files}"; then
            echo "Downloaded candidate does not contain the exact finalized 11-file release bundle" >&2
            exit 1
          fi
          while IFS= read -r file; do
            if [[ -L "release-assets/${file}" || ! -f "release-assets/${file}" ]]; then
              echo "Candidate bundle entry is not a top-level regular file: ${file}" >&2
              exit 1
            fi
          done < "${expected_files}"
          actual_bundle_digest="$(sha256sum release-assets/checksums.txt | awk '{print tolower($1)}')"
          if [[ "${actual_bundle_digest}" != "${EXPECTED_BUNDLE_DIGEST}" ]]; then
            echo "Downloaded candidate bundle digest changed: expected=${EXPECTED_BUNDLE_DIGEST} actual=${actual_bundle_digest}" >&2
            exit 1
          fi
          (
            cd release-assets
            sha256sum --check --strict checksums.txt
          )

      - name: Require exact-SHA promotion to main
        shell: bash
        env:
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
        run: |
          git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          main_commit="$(git rev-parse refs/remotes/origin/main)"
          if [[ "${main_commit}" != "${RELEASE_COMMIT}" ]]; then
            echo "Accepted candidate must be promoted to origin/main without merge, squash, or rebase SHA changes" >&2
            echo "accepted=${RELEASE_COMMIT} origin/main=${main_commit}" >&2
            exit 1
          fi

      - name: Verify independent second-machine acceptance authorization
        if: ${{ !inputs.waive_independent_acceptance }}
        shell: bash
        env:
          CPA_INDEPENDENT_ACCEPTED_RELEASES: ${{ vars.CPA_INDEPENDENT_ACCEPTED_RELEASES }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
          RELEASE_BUNDLE_DIGEST: ${{ needs.verify-assets.outputs.bundle_digest }}
        run: |
          bash scripts/check-release-acceptance.sh \
            "${RELEASE_TAG}" \
            "${RELEASE_COMMIT}" \
            "${RELEASE_BUNDLE_DIGEST}"

      - name: Record repository-owner second-machine waiver
        if: ${{ inputs.waive_independent_acceptance }}
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          WAIVER_CONFIRMATION: ${{ inputs.waiver_confirmation }}
        run: |
          bash scripts/check-release-waiver.sh \
            "${RELEASE_TAG}" \
            "${GITHUB_ACTOR}" \
            "${GITHUB_REPOSITORY_OWNER}" \
            "${WAIVER_CONFIRMATION}"
          echo "::warning::Independent second-machine acceptance was waived by repository owner ${GITHUB_ACTOR} for ${RELEASE_TAG}"
          {
            echo "## Owner waiver"
            echo
            echo "Independent second-machine acceptance was explicitly waived by repository owner \`${GITHUB_ACTOR}\` for \`${RELEASE_TAG}\`."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Revalidate latest published CLIProxyAPI target
        shell: bash
        env:
          CPA_COMPAT_CHANNEL: latest-release
          CPA_COMPAT_GITHUB_TOKEN: ${{ github.token }}
          CPA_COMPAT_VALIDATE_ONLY: "true"
        run: bash scripts/check-cpa-compat.sh

      - name: Inspect resumable publication state
        id: publication_state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
          RELEASE_BUNDLE_DIGEST: ${{ needs.verify-assets.outputs.bundle_digest }}
          ACCEPTANCE_WAIVED: ${{ needs.validate.outputs.acceptance_waived }}
          WAIVER_ACTOR: ${{ github.actor }}
        run: |
          github_api_status() {
            local endpoint="$1"
            local response exit_code status
            set +e
            response="$(gh api --include "${endpoint}" 2>&1)"
            exit_code=$?
            set -e
            status="$(awk '/^HTTP\/[0-9.]+ [0-9][0-9][0-9]/ { code=$2 } END { print code }' <<< "${response}")"
            if [[ -z "${status}" ]]; then
              echo "GitHub API request failed before returning an HTTP status: ${endpoint} (exit ${exit_code})" >&2
              return 1
            fi
            printf '%s\n' "${status}"
          }

          acceptance_note="Independent second-machine acceptance: authorized"
          if [[ "${ACCEPTANCE_WAIVED}" == "true" ]]; then
            acceptance_note="Independent second-machine acceptance: waived by repository owner ${WAIVER_ACTOR}"
          fi
          expected_tag_message="$(printf '%s\n\nSource commit: %s\nCandidate bundle digest: %s\n%s\nWorkflow run: %s/%s/actions/runs/%s\n' \
            "Release ${RELEASE_TAG}" \
            "${RELEASE_COMMIT}" \
            "${RELEASE_BUNDLE_DIGEST}" \
            "${acceptance_note}" \
            "${GITHUB_SERVER_URL}" \
            "${GITHUB_REPOSITORY}" \
            "${GITHUB_RUN_ID}")"
          tag_exists=false
          tag_status="$(github_api_status "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}")"
          case "${tag_status}" in
            200)
              tag_ref="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '[.object.type, .object.sha] | @tsv')"
              IFS=$'\t' read -r object_type tag_object_sha <<< "${tag_ref}"
              if [[ "${object_type}" != "tag" || ! "${tag_object_sha}" =~ ^[0-9a-f]{40}$ ]]; then
                echo "Existing ${RELEASE_TAG} ref is not an annotated tag" >&2
                exit 1
              fi
              tag_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}")"
              if [[ "$(jq -r .tag <<< "${tag_json}")" != "${RELEASE_TAG}" || \
                    "$(jq -r .message <<< "${tag_json}")" != "${expected_tag_message}" || \
                    "$(jq -r .object.type <<< "${tag_json}")" != "commit" || \
                    "$(jq -r .object.sha <<< "${tag_json}")" != "${RELEASE_COMMIT}" ]]; then
                echo "Existing annotated tag does not match this run's accepted commit and bundle digest" >&2
                exit 1
              fi
              tag_exists=true
              ;;
            404) ;;
            *)
              echo "Cannot safely determine whether tag ${RELEASE_TAG} exists (HTTP ${tag_status})" >&2
              exit 1
              ;;
          esac

          release_state=none
          release_status="$(github_api_status "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")"
          case "${release_status}" in
            200)
              release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")"
              if [[ "$(jq -r .tag_name <<< "${release_json}")" != "${RELEASE_TAG}" || \
                    "$(jq -r .name <<< "${release_json}")" != "${RELEASE_TAG}" || \
                    "$(jq -r .prerelease <<< "${release_json}")" != "false" ]]; then
                echo "Existing Release metadata does not match the accepted stable tag" >&2
                exit 1
              fi
              if [[ "${tag_exists}" != "true" ]]; then
                echo "Existing Release has no matching accepted annotated tag" >&2
                exit 1
              fi
              if [[ "$(jq -r .draft <<< "${release_json}")" == "true" ]]; then
                release_state=draft
              else
                release_state=published
              fi
              ;;
            404) ;;
            *)
              echo "Cannot safely determine whether release ${RELEASE_TAG} exists (HTTP ${release_status})" >&2
              exit 1
              ;;
          esac

          echo "tag_exists=${tag_exists}" >> "${GITHUB_OUTPUT}"
          echo "release_state=${release_state}" >> "${GITHUB_OUTPUT}"
          echo "Publication state: tag=${tag_exists} release=${release_state}"

      - name: Resolve previous published release
        id: previous-release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          RELEASE_IS_PRERELEASE: "false"
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
        run: |
          previous_tag="$(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" |
              jq -s 'add' |
              bash scripts/select-previous-release-tag.sh \
                "${RELEASE_TAG}" \
                "${RELEASE_IS_PRERELEASE}"
          )"
          if [[ -n "${previous_tag}" ]]; then
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${previous_tag}" >/dev/null
            git fetch --force --no-tags origin "refs/tags/${previous_tag}:refs/tags/${previous_tag}"
            previous_commit="$(git rev-list -n 1 "${previous_tag}")"
            if [[ -z "${previous_commit}" ]] || ! git merge-base --is-ancestor "${previous_commit}" "${RELEASE_COMMIT}"; then
              echo "Previous published release ${previous_tag} is not an ancestor of ${RELEASE_COMMIT}" >&2
              exit 1
            fi
            echo "Generating release notes from previous published release ${previous_tag}"
          else
            echo "No previous published release found; GitHub will generate initial release notes"
          fi
          echo "tag=${previous_tag}" >> "${GITHUB_OUTPUT}"

      - name: Attest release provenance
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            release-assets/*.zip
            release-assets/*.spdx.json
            release-assets/checksums.txt

      - name: Create or resume accepted annotated release tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
          RELEASE_BUNDLE_DIGEST: ${{ needs.verify-assets.outputs.bundle_digest }}
          TAG_EXISTS: ${{ steps.publication_state.outputs.tag_exists }}
          ACCEPTANCE_WAIVED: ${{ needs.validate.outputs.acceptance_waived }}
          WAIVER_ACTOR: ${{ github.actor }}
        run: |
          acceptance_note="Independent second-machine acceptance: authorized"
          if [[ "${ACCEPTANCE_WAIVED}" == "true" ]]; then
            acceptance_note="Independent second-machine acceptance: waived by repository owner ${WAIVER_ACTOR}"
          fi
          expected_tag_message="$(printf '%s\n\nSource commit: %s\nCandidate bundle digest: %s\n%s\nWorkflow run: %s/%s/actions/runs/%s\n' \
            "Release ${RELEASE_TAG}" \
            "${RELEASE_COMMIT}" \
            "${RELEASE_BUNDLE_DIGEST}" \
            "${acceptance_note}" \
            "${GITHUB_SERVER_URL}" \
            "${GITHUB_REPOSITORY}" \
            "${GITHUB_RUN_ID}")"
          if [[ "${TAG_EXISTS}" != "true" ]]; then
            tag_object_sha="$(
              gh api --method POST "repos/${GITHUB_REPOSITORY}/git/tags" \
                --raw-field tag="${RELEASE_TAG}" \
                --raw-field message="${expected_tag_message}" \
                --raw-field object="${RELEASE_COMMIT}" \
                --raw-field type=commit \
                --jq .sha
            )"
            if [[ ! "${tag_object_sha}" =~ ^[0-9a-f]{40}$ ]]; then
              echo "GitHub did not return an annotated tag object SHA" >&2
              exit 1
            fi
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              --raw-field ref="refs/tags/${RELEASE_TAG}" \
              --raw-field sha="${tag_object_sha}" >/dev/null
          else
            echo "Resuming publication with the annotated tag created by this workflow run"
          fi

          tag_ref="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '[.object.type, .object.sha] | @tsv')"
          IFS=$'\t' read -r object_type object_sha <<< "${tag_ref}"
          if [[ "${object_type}" != "tag" || ! "${object_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Release ref is not an annotated tag object" >&2
            exit 1
          fi
          tag_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${object_sha}")"
          if [[ "$(jq -r .tag <<< "${tag_json}")" != "${RELEASE_TAG}" || \
                "$(jq -r .message <<< "${tag_json}")" != "${expected_tag_message}" || \
                "$(jq -r .object.type <<< "${tag_json}")" != "commit" || \
                "$(jq -r .object.sha <<< "${tag_json}")" != "${RELEASE_COMMIT}" ]]; then
            echo "Annotated release tag does not match this run's accepted commit and bundle digest" >&2
            exit 1
          fi

      - name: Create, resume, and verify release publication
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          RELEASE_STATE: ${{ steps.publication_state.outputs.release_state }}
          PREVIOUS_TAG: ${{ steps.previous-release.outputs.tag }}
          EXPECTED_BUNDLE_DIGEST: ${{ needs.verify-assets.outputs.bundle_digest }}
          ACCEPTANCE_WAIVED: ${{ needs.validate.outputs.acceptance_waived }}
          WAIVER_ACTOR: ${{ github.actor }}
        run: |
          waiver_notice=""
          if [[ "${ACCEPTANCE_WAIVED}" == "true" ]]; then
            waiver_notice="> **Owner waiver:** Independent second-machine acceptance was explicitly waived by repository owner \`${WAIVER_ACTOR}\` for this release. All automated source, compatibility, build, asset, and provenance gates still ran."
          fi
          release_args=(
            "${RELEASE_TAG}"
            release-assets/*
            --draft
            --generate-notes
            --title "${RELEASE_TAG}"
            --verify-tag
          )
          if [[ -n "${PREVIOUS_TAG}" ]]; then
            release_args+=(--notes-start-tag "${PREVIOUS_TAG}")
          fi
          if [[ -n "${waiver_notice}" ]]; then
            release_args+=(--notes "${waiver_notice}")
          fi

          case "${RELEASE_STATE}" in
            none)
              gh release create "${release_args[@]}"
              ;;
            draft)
              gh release upload "${RELEASE_TAG}" release-assets/* --clobber
              ;;
            published)
              echo "Release already published by this workflow run; verifying exact assets"
              ;;
            *)
              echo "Unknown resumable Release state: ${RELEASE_STATE}" >&2
              exit 1
              ;;
          esac

          if [[ -n "${waiver_notice}" ]]; then
            release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")"
            release_body="$(jq -r '.body // ""' <<< "${release_json}")"
            if [[ "${release_body}" != *"${waiver_notice}"* ]]; then
              if [[ "${RELEASE_STATE}" == "published" ]]; then
                echo "Published owner-waived Release is missing its required waiver notice" >&2
                exit 1
              fi
              waiver_notes="${RUNNER_TEMP}/owner-waiver-release-notes.md"
              {
                printf '%s\n' "${waiver_notice}"
                if [[ -n "${release_body}" ]]; then
                  printf '\n%s\n' "${release_body}"
                fi
              } > "${waiver_notes}"
              gh release edit "${RELEASE_TAG}" --notes-file "${waiver_notes}"
            fi
          fi

          published_assets="$(mktemp -d)"
          trap 'rm -rf "${published_assets}"' EXIT
          gh release download "${RELEASE_TAG}" --dir "${published_assets}"

          expected_files="${RUNNER_TEMP}/expected-published-files.txt"
          actual_files="${RUNNER_TEMP}/actual-published-files.txt"
          awk '{print $2}' release-assets/checksums.txt | LC_ALL=C sort > "${expected_files}"
          echo checksums.txt >> "${expected_files}"
          LC_ALL=C sort -o "${expected_files}" "${expected_files}"
          find "${published_assets}" -mindepth 1 -maxdepth 1 -printf '%f\n' | LC_ALL=C sort > "${actual_files}"
          if ! diff -u "${expected_files}" "${actual_files}"; then
            echo "GitHub Release does not contain the exact finalized 11-file bundle" >&2
            if [[ "${RELEASE_STATE}" == "draft" || "${RELEASE_STATE}" == "none" ]]; then
              echo "Delete only the draft Release, keep the accepted annotated tag, and rerun this job" >&2
            fi
            exit 1
          fi
          while IFS= read -r file; do
            if [[ -L "${published_assets}/${file}" || ! -f "${published_assets}/${file}" ]]; then
              echo "GitHub Release asset is not a top-level regular file: ${file}" >&2
              exit 1
            fi
            if ! cmp --silent "release-assets/${file}" "${published_assets}/${file}"; then
              echo "GitHub Release asset differs from the accepted candidate: ${file}" >&2
              exit 1
            fi
          done < "${expected_files}"
          actual_bundle_digest="$(sha256sum "${published_assets}/checksums.txt" | awk '{print tolower($1)}')"
          if [[ "${actual_bundle_digest}" != "${EXPECTED_BUNDLE_DIGEST}" ]]; then
            echo "Published bundle digest differs from the accepted candidate" >&2
            exit 1
          fi
          (
            cd "${published_assets}"
            sha256sum --check --strict checksums.txt
          )

          if [[ "${RELEASE_STATE}" != "published" ]]; then
            gh release edit "${RELEASE_TAG}" \
              --draft=false \
              --latest \
              --prerelease=false \
              --title "${RELEASE_TAG}" \
              --verify-tag
          fi

          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")"
          if [[ "$(jq -r .draft <<< "${release_json}")" != "false" || \
                "$(jq -r .prerelease <<< "${release_json}")" != "false" || \
                "$(jq -r .name <<< "${release_json}")" != "${RELEASE_TAG}" || \
                "$(jq -r .tag_name <<< "${release_json}")" != "${RELEASE_TAG}" ]]; then
            echo "Final GitHub Release metadata is not the accepted stable publication" >&2
            exit 1
          fi
