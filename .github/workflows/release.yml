name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer to build, with or without the v prefix"
        required: true
        type: string
      publish_prerelease:
        description: "Publish a prerelease tag from this exact commit"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'push' && github.ref_name || (startsWith(inputs.version, 'v') && inputs.version || format('v{0}', inputs.version)) }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.26.5"
  GOVULNCHECK_VERSION: "v1.6.0"
  PLUGIN_REPOSITORY: https://github.com/yujianwudi/codex-token-usage

jobs:
  validate:
    name: Validate release request
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      publish: ${{ steps.version.outputs.publish }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate version, source, and immutable tag event
        id: version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          PUBLISH_PRERELEASE: ${{ inputs.publish_prerelease }}
          TAG_CREATED: ${{ github.event.created }}
          TAG_FORCED: ${{ github.event.forced }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            if [[ "${TAG_CREATED}" != "true" || "${TAG_FORCED}" == "true" ]]; then
              echo "Release tags are immutable; tag updates and force-pushes are rejected" >&2
              exit 1
            fi
            release_ref="${GITHUB_REF_NAME}"

            git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
            if ! git merge-base --is-ancestor HEAD refs/remotes/origin/main; then
              echo "Stable release tags must point to a commit contained in origin/main" >&2
              exit 1
            fi
          else
            requested="${REQUESTED_VERSION#v}"
            if [[ -z "${requested}" ]]; then
              echo "Manual release validation requires an explicit version" >&2
              exit 1
            fi
            release_ref="v${requested}"
          fi

          version="$(bash scripts/resolve-release-version.sh "${release_ref}")"
          tag="v${version}"
          version_without_build="${version%%+*}"
          prerelease=false
          if [[ "${version_without_build}" == *-* ]]; then
            prerelease=true
          fi

          publish=false
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            publish=true
            remote_refs="$(git ls-remote --tags origin "refs/tags/${tag}" "refs/tags/${tag}^{}")"
            remote_commit="$(awk '$2 ~ /\^\{\}$/ { print $1; found=1 } END { if (!found && NR > 0) print first } NR == 1 { first=$1 }' <<< "${remote_refs}" | tail -n 1)"
            if [[ -z "${remote_commit}" || "${remote_commit}" != "$(git rev-parse HEAD)" ]]; then
              echo "Remote tag ${tag} no longer resolves to the workflow commit" >&2
              exit 1
            fi
          elif [[ "${PUBLISH_PRERELEASE}" == "true" ]]; then
            if [[ "${prerelease}" != "true" ]]; then
              echo "Manual publishing is restricted to prerelease SemVer versions" >&2
              exit 1
            fi
            publish=true
          fi

          {
            echo "version=${version}"
            echo "tag=${tag}"
            echo "publish=${publish}"
            echo "prerelease=${prerelease}"
          } >> "${GITHUB_OUTPUT}"

  source-security:
    name: Source security gate
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify module and release compliance
        shell: bash
        run: |
          go mod download
          go mod verify
          go mod tidy -diff
          bash scripts/check-third-party-notices.sh
          bash scripts/check-version-consistency.sh

      - name: Source vulnerability scan
        shell: bash
        run: go run "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}" -mode=source ./...

      - name: Verify pinned latest CLIProxyAPI compatibility
        shell: bash
        run: bash scripts/check-cpa-compat.sh

  build-linux:
    name: Build linux ${{ matrix.goarch }}
    needs:
      - validate
      - source-security
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-latest
          - goarch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    container:
      # Keep the glibc 2.31 build root reproducible on both amd64 and arm64.
      image: ubuntu:20.04@sha256:8feb4d8ca5354def3d8fce243717141ce31e2c428701f6682bd2fafe15388214
    env:
      GOOS: linux
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: "1"
      PLUGIN_VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Install Linux build dependencies
        shell: bash
        run: |
          packages=(binutils ca-certificates curl file gcc git libc6-dev python3 tar unzip zip)
          apt_options=(
            -o Acquire::Retries=2
            -o Acquire::ForceIPv4=true
            -o Acquire::http::Timeout=30
            -o Acquire::https::Timeout=30
          )

          rm -rf /var/lib/apt/lists/*
          for attempt in 1 2 3; do
            if apt-get "${apt_options[@]}" -o APT::Update::Error-Mode=any update; then
              break
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "Linux package index update failed after ${attempt} attempts" >&2
              exit 1
            fi
            delay=$((attempt * 15))
            echo "Linux package index update failed; retrying in ${delay}s (${attempt}/3)" >&2
            sleep "${delay}"
          done

          for attempt in 1 2 3; do
            if DEBIAN_FRONTEND=noninteractive apt-get "${apt_options[@]}" install -y --no-install-recommends "${packages[@]}"; then
              break
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "Linux dependency installation failed after ${attempt} attempts" >&2
              exit 1
            fi
            delay=$((attempt * 15))
            echo "Linux dependency installation failed; retrying in ${delay}s (${attempt}/3)" >&2
            sleep "${delay}"
          done
          rm -rf /var/lib/apt/lists/*

      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Test
        run: go test ./...

      - name: Package
        shell: bash
        run: bash ./package-release.sh dist

      - name: Binary vulnerability scan
        shell: bash
        run: go run "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}" -mode=binary ./codex-token-usage.so

      - name: Linux dlopen and ABI smoke test
        shell: bash
        run: bash scripts/smoke-abi.sh ./codex-token-usage.so

      - name: Enforce glibc 2.31 compatibility ceiling
        shell: bash
        run: bash scripts/check-glibc.sh ./codex-token-usage.so 2.31

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: codex-token-usage.so
          format: spdx-json
          output-file: dist/codex-token-usage_${{ needs.validate.outputs.version }}_linux_${{ matrix.goarch }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cpa-plugin-linux-${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/*.spdx.json
          if-no-files-found: error
          retention-days: 7

  build-other:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    needs:
      - validate
      - source-security
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            # macos-15-intel is the current standard x64 label; format() keeps
            # older actionlint runner catalogs from rejecting the valid label.
            runner: ${{ format('macos-15-{0}', 'intel') }}
            ext: dylib
            macos_target: "12.0"
          - goos: darwin
            goarch: arm64
            runner: macos-15
            ext: dylib
            macos_target: "12.0"
          - goos: windows
            goarch: amd64
            runner: windows-2025
            ext: dll
            macos_target: ""
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: "1"
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_target }}
      PLUGIN_VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify native build host architecture
        shell: bash
        run: |
          host_arch="$(go env GOHOSTARCH)"
          if [[ "${host_arch}" != "${GOARCH}" ]]; then
            echo "CGO release builds must be native: host=${host_arch} target=${GOARCH}" >&2
            exit 1
          fi

      - name: Install Windows C compiler
        if: matrix.goos == 'windows'
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            zip

      - name: Add MSYS2 to PATH
        if: matrix.goos == 'windows'
        shell: pwsh
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Test
        run: go test ./...

      - name: Package
        shell: bash
        run: bash ./package-release.sh dist

      - name: Shared-library ABI and architecture smoke test
        shell: bash
        run: bash scripts/smoke-abi.sh "./codex-token-usage.${{ matrix.ext }}" "${GOOS}" "${GOARCH}"

      - name: Enforce Darwin architecture and macOS 12 compatibility
        if: matrix.goos == 'darwin'
        shell: bash
        run: bash scripts/check-macho.sh ./codex-token-usage.dylib "${GOARCH}" "${MACOSX_DEPLOYMENT_TARGET}"

      - name: Binary vulnerability scan
        shell: bash
        run: go run "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}" -mode=binary "./codex-token-usage.${{ matrix.ext }}"

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: codex-token-usage.${{ matrix.ext }}
          format: spdx-json
          output-file: dist/codex-token-usage_${{ needs.validate.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cpa-plugin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/*.spdx.json
          if-no-files-found: error
          retention-days: 7

  verify-assets:
    name: Verify complete release bundle
    needs:
      - validate
      - build-linux
      - build-other
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify release assets and generate checksums
        shell: bash
        run: bash scripts/verify-release-assets.sh "${{ needs.validate.outputs.version }}" release-assets

      - name: Upload verified release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cpa-plugin-release-${{ needs.validate.outputs.version }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs:
      - validate
      - verify-assets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: needs.validate.outputs.publish == 'true'
    concurrency:
      group: publish-${{ needs.validate.outputs.tag }}
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download verified release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cpa-plugin-release-${{ needs.validate.outputs.version }}
          path: release-assets

      - name: Refuse tag or release replacement
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: |
          github_api_status() {
            local endpoint="$1"
            local response exit_code status
            set +e
            response="$(gh api --include "${endpoint}" 2>&1)"
            exit_code=$?
            set -e
            status="$(awk '/^HTTP\/[0-9.]+ [0-9][0-9][0-9]/ { code=$2 } END { print code }' <<< "${response}")"
            if [[ -z "${status}" ]]; then
              echo "GitHub API request failed before returning an HTTP status: ${endpoint} (exit ${exit_code})" >&2
              return 1
            fi
            printf '%s\n' "${status}"
          }

          release_status="$(github_api_status "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")"
          case "${release_status}" in
            200)
              echo "Release ${RELEASE_TAG} already exists; published releases are immutable" >&2
              exit 1
              ;;
            404) ;;
            *)
              echo "Cannot safely determine whether release ${RELEASE_TAG} exists (HTTP ${release_status})" >&2
              exit 1
              ;;
          esac

          tag_ref_exists=false
          tag_ref=""
          tag_status="$(github_api_status "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}")"
          case "${tag_status}" in
            200)
              tag_ref="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '[.object.type, .object.sha] | @tsv')"
              tag_ref_exists=true
              ;;
            404) ;;
            *)
              echo "Cannot safely determine whether tag ${RELEASE_TAG} exists (HTTP ${tag_status})" >&2
              exit 1
              ;;
          esac
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${tag_ref_exists}" == "true" ]]; then
            echo "Tag ${RELEASE_TAG} already exists; manual prereleases must use a new tag" >&2
            exit 1
          fi
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${tag_ref_exists}" != "true" ]]; then
            echo "Release tag ${RELEASE_TAG} disappeared before publication" >&2
            exit 1
          fi
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            IFS=$'\t' read -r object_type object_sha <<< "${tag_ref}"
            for _ in 1 2 3; do
              [[ "${object_type}" == "tag" ]] || break
              tag_object="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${object_sha}" --jq '[.object.type, .object.sha] | @tsv')"
              IFS=$'\t' read -r object_type object_sha <<< "${tag_object}"
            done
            if [[ "${object_type}" != "commit" || "${object_sha}" != "${GITHUB_SHA}" ]]; then
              echo "Release tag ${RELEASE_TAG} moved away from workflow commit ${GITHUB_SHA}" >&2
              exit 1
            fi
          fi

      - name: Resolve previous published release
        id: previous-release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          RELEASE_IS_PRERELEASE: ${{ needs.validate.outputs.prerelease }}
        run: |
          previous_tag="$(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" |
              jq -s 'add' |
              bash scripts/select-previous-release-tag.sh \
                "${RELEASE_TAG}" \
                "${RELEASE_IS_PRERELEASE}"
          )"
          if [[ -n "${previous_tag}" ]]; then
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${previous_tag}" >/dev/null
            git fetch --force --no-tags origin "refs/tags/${previous_tag}:refs/tags/${previous_tag}"
            previous_commit="$(git rev-list -n 1 "${previous_tag}")"
            if [[ -z "${previous_commit}" ]] || ! git merge-base --is-ancestor "${previous_commit}" "${GITHUB_SHA}"; then
              echo "Previous published release ${previous_tag} is not an ancestor of ${GITHUB_SHA}" >&2
              exit 1
            fi
            echo "Generating release notes from previous published release ${previous_tag}"
          else
            echo "No previous published release found; GitHub will generate initial release notes"
          fi
          echo "tag=${previous_tag}" >> "${GITHUB_OUTPUT}"

      - name: Attest release provenance
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            release-assets/*.zip
            release-assets/*.spdx.json
            release-assets/checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          previous_tag: ${{ steps.previous-release.outputs.tag }}
          tag_name: ${{ needs.validate.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ needs.validate.outputs.prerelease }}
          make_latest: ${{ needs.validate.outputs.prerelease != 'true' }}
