name: CPA Compatibility Watch

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cpa-compat-watch-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.5"

jobs:
  compatibility:
    name: Verify CPA ${{ matrix.channel }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        channel:
          - latest-release
          - latest-main
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Resolve CPA revision
        id: resolve_cpa
        shell: bash
        env:
          CPA_COMPAT_CHANNEL: ${{ matrix.channel }}
          CPA_COMPAT_GITHUB_TOKEN: ${{ github.token }}
          CPA_COMPAT_VALIDATE_ONLY: "true"
        run: |
          resolved="$(bash scripts/check-cpa-compat.sh)"
          printf '%s\n' "${resolved}"
          commit="$(sed -n 's/^commit=//p' <<< "${resolved}" | tail -n 1)"
          [[ "${commit}" =~ ^[0-9a-f]{40}$ ]]
          echo "commit=${commit}" >> "${GITHUB_OUTPUT}"

      # Keep downloaded latest-main source in a token-free final step so it
      # cannot inspect an ancestor process that carries the resolver token.
      - name: Dynamically load plugin in resolved CPA without credentials
        shell: bash
        env:
          CPA_COMPAT_CHANNEL: locked
          CPA_COMPAT_COMMIT: ${{ steps.resolve_cpa.outputs.commit }}
          CPA_COMPAT_EXECUTION_MODE: docker
        run: bash scripts/check-cpa-compat.sh
