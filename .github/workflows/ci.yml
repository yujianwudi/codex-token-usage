name: CI

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.5"
  GOVULNCHECK_VERSION: "v1.6.0"
  ACTIONLINT_VERSION: "v1.7.7"
  SHELLCHECK_VERSION: "v0.11.0"
  SHELLCHECK_LINUX_X86_64_SHA256: "8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198"

jobs:
  test:
    name: Test and source security scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install pinned ShellCheck
        shell: bash
        run: |
          archive="${RUNNER_TEMP}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          url="https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          curl --fail --location --silent --show-error \
            --retry 3 --retry-all-errors \
            --output "${archive}" \
            "${url}"
          printf '%s  %s\n' "${SHELLCHECK_LINUX_X86_64_SHA256}" "${archive}" | sha256sum -c -
          tar -xJf "${archive}" -C "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64" >> "${GITHUB_PATH}"

      - name: Verify module and script syntax
        shell: bash
        run: |
          go mod download
          go mod verify
          go mod tidy -diff
          bash -n build.sh
          bash -n package-release.sh
          for script in scripts/*.sh; do
            bash -n "${script}"
          done
          bash scripts/check-third-party-notices.sh
          bash scripts/check-version-consistency.sh
          bash scripts/test-semver.sh
          bash scripts/test-check-macho.sh
          bash scripts/test-select-previous-release-tag.sh
          bash scripts/test-verify-release-assets.sh

      - name: Lint Go, shell, and workflows
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "${unformatted}" ]]; then
            echo "Go files require gofmt:" >&2
            echo "${unformatted}" >&2
            exit 1
          fi
          shellcheck -x build.sh package-release.sh scripts/*.sh
          go run "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}" \
            -shellcheck="$(command -v shellcheck)" \
            .github/workflows/*.yml

      - name: Test
        run: go test ./...

      - name: Verify pinned latest CLIProxyAPI compatibility
        shell: bash
        run: bash scripts/check-cpa-compat.sh

      - name: Race test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Source vulnerability scan
        shell: bash
        run: go run "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}" -mode=source ./...
